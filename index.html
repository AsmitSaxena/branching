<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #9c9a9a;
      }
      div {
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #5e5a5a;
        flex-direction: column;
        padding: 20px;
        border-radius: 10px;
        width: 600px;
      }
      form {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        padding: 20px;
        margin: 10px;
        gap: 10px;
        width: 500px;
      }
      label {
        margin-bottom: 10px;
        width: 500px;
      }
      input {
        background-color: #9c9a9a;
        border: none;
        border-radius: 10px;
        padding: 5px;
        margin: 10px;
        margin-left: 0px;
        width: 400px;
      }
      button {
        background-color: #9c9a9a;
        border-radius: 10px;
        border: none;
        padding: 10px;
        width: 100%;
        margin: 10px;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>Login Page</h1>
      <form action="">
        <label><input type="email" placeholder="Enter your Email" /></label>
        <label
          ><input type="password" placeholder="Enter your Password"
        /></label>
        <button>Submit</button>
      </form>
    </div>
  </body>
</html>
